<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício JS</title>
        <link rel="stylesheet" href="style.css">
        <!-- O defer garante que o JS rode após o HTML ser carregado -->
        <script src="script.js" defer></script>
    </head>
    <body>
        <div id="fundoColorido">
            <!-- Título que será alterado ao clicar no botão -->
            <h1 class="titulo" style="text-align: center;">Exercício JS</h1>
            <!-- Botão que dispara a resolução do exercício -->
            <button id="resolverExercicio">Resolver o exercício</button>

            <p>Primeiro parágrafo</p>
            <p class="destaque">Segundo parágrafo</p>
            <p>Terceiro parágrafo</p>
            <button id="alterarParagrafo">Destacar parágrafo</button><br><br>

            <img src="ifgoiano.png" alt="Ifgoiano" width="200"><br>
            <button class="doisBotões" id="Aumentar">Ampliar imagem</button>
            <button class="doisBotões" id="Diminuir">Reduzir imagem</button>
        </div>
        <button class="cantoInferiorDireito" id="fecharOuAbrir">Fechar</button>
    </body>
</html>
