<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<title>Cores, tamanhos e fontes</title>
		<style>
			body{
				display: flex;
				justify-content: center;
				align-items: center;
			
			}
			.box{
				width: 600px;
				padding: 4px;
				border: 1px solid;
				text-align: justify;
			}
		</style>
	</head>
	<body>
		<div class="box">
			<p><font color="#F00" face="Arial" size="5"> Texto escrito em vermelho, fonte Arial e tamanho 5</font></p>
			<p><font color="#00F" face="Courier" size="3">Texto escrito em azul, fonte Courier e tamanho 3</font></p>
			<p><font color="#0F0" face="Tahoma" size="2">Texto escrito em verde, fonte Tahoma e tamanho 2</font></p>
			<p><font size="4"><font color="#F00">Vermelho,</font><font color="#00F"> azul,</font><font color="#0F0"> verde,</font> <font color="#000"> Tamanho 4.</font></font></p>
		</div>
	</body>
</html>
