<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercício JS</title>
        <link rel="stylesheet" href="style.css">
        <!-- O defer garante que o JS rode após o HTML ser carregado -->
        <script src="script.js" defer></script>
    </head>
    <body>
        <div>
            <!-- Título que será alterado ao clicar no botão -->
            <h1 class="titulo">Exercício JS</h1>
            <!-- Botão que dispara a resolução do exercício -->
            <button id="resolverExercicio">Resolver o exercício</button>
        </div>
    </body>
</html>
